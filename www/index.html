<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUKAS</title>

    <link rel="shortcut icon" href="assets/img/Lucas.png" type="image/png">

    <!-- Bootsrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- Bootsrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Particle js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js"
        type="text/javascript"></script>

    <!-- Texllate  -->
    <link rel="stylesheet" href="assets/vendore/texllate/animate.css">

    <link rel="stylesheet" href="style.css">




</head>

<body>
    <!-- ================= LOGIN SCREEN ================= -->
    <div id="login-screen" class="login-screen">

        <div class="login-box">
            <h2>Lukas AI</h2>

            <input id="loginEmail" placeholder="Email">
            <div class="password-wrapper">
                <input id="loginPassword" type="password" placeholder="Password">
                <i class="bi bi-eye-slash" id="togglePassword"></i>
            </div>

            <button id="loginBtn" onclick="doLogin()">Login</button>
            <button id="registerBtn" onclick="doRegister()">Register</button>
            <button onclick="continueGuest()" class="login-btn guest">
                Continue as Guest
            </button>

            <div id="loginStatus"></div>
        </div>

    </div>
    <div class="container">


        <section id="Oval" class="mb-4">

            <div class="row">
                <div class="col-md-1"></div>
                <div class="col-md-10">
                    <div class="d-flex justify-content-center align-items-center" style="height: 80vh;">
                        <!-- <button id="orb-close-btn">✕</button> -->
                        <canvas id="canvasOne" width="700" height="420" style="position: absolute;"></canvas>

                        <div id="JarvisHood">

                            <div class="square">
                                <span class="circle"></span>
                                <span class="circle"></span>
                                <span class="circle"></span>
                            </div>

                        </div>

                    </div>
                    <h5 class="text-light text text-center">Ask me anything</h5>

                    <div class="col-md-12 mt-4 pt-4">
                        <div class="text-center">
                            <div id="TextInput" class="d-flex">

                                <input type="text" class="input-field" name="chatbox" id="chatbox"
                                    placeholder="type here ... ">
                                <button id="SendBtn" class="glow-on-hover" hidden><i class="bi bi-send"></i></button>
                                <button id="MicBtn" class="glow-on-hover"><i class="bi bi-mic"></i></button>
                                <button id="ChatBtn" class="glow-on-hover" data-bs-toggle="offcanvas"
                                    data-bs-target="#offcanvasScrolling" aria-controls="offcanvasScrolling"><i
                                        class="bi bi-chat-dots"></i></button>
                                <button id="SettingsBtn" class="glow-on-hover"><i class="bi bi-gear"></i></button>

                            </div>
                        </div>
                    </div>

                </div>
                <div class="col-md-1"></div>
            </div>

        </section>

        <!-- <div id="orb-container">
            <canvas id="lukas-orb" width="300" height="300"></canvas>
        </div> -->


    </div>
    <div id="orb-container">
        <button id="orb-close-btn">✕</button>
        <canvas id="lukas-orb"></canvas>
    </div>
    <div class="offcanvas offcanvas-start chat-canvas" data-bs-scroll="true" data-bs-backdrop="false" tabindex="-1"
        id="offcanvasScrolling" aria-labelledby="offcanvasScrollingLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title text-white" id="offcanvasScrollingLabel">Chats</h5>
            <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div id="chat-canvas-body" class="offcanvas-body">
            <!-- Chatting code here -->

        </div>
    </div>
    <!-- ⚙️ SETTINGS PANEL -->
    <!-- ⚙️ LUKAS PRO SETTINGS -->
    <!-- ================= SETTINGS PANEL ================= -->
    <div id="settings-panel" class="settings-panel">

        <div class="settings-header">
            <div class="settings-title">
                <h5>Lukas AI</h5>
                <small class="version-text">Version 1.0.0 • Neural Core</small>
            </div>
            <button id="closeSettings" class="close-btn">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <div class="settings-body">

            <!-- CHAT -->
            <div class="settings-group">
                <div class="group-title">Chat</div>

                <button class="setting-item" onclick="startNewChat()">
                    🆕 New Chat
                </button>

                <button class="setting-item" onclick="exportChat()">
                    📂 Export Chat
                </button>
            </div>

            <!-- VOICE -->
            <div class="settings-group">
                <div class="group-title">Voice Engine</div>

                <button class="setting-item" onclick="lukasSettings.setVoice('male')">
                    🧑 Male Voice
                </button>

                <button class="setting-item" onclick="lukasSettings.setVoice('female')">
                    👩 Female Voice
                </button>
            </div>

            <!-- SUBSCRIPTION -->
            <div class="settings-group">
                <div class="group-title">Subscription</div>

                <button class="setting-item" onclick="lukasUpgrade()">
                    💎 Upgrade to Pro
                </button>
            </div>

            <!-- SUPPORT -->
            <div class="settings-group">
                <div class="group-title">Support</div>

                <button class="setting-item" onclick="openContact()">
                    📞 Contact Us
                </button>

                <button class="setting-item" onclick="openAbout()">
                    ℹ️ About Lukas
                </button>
            </div>

            <!-- ACCOUNT -->
            <div class="settings-group">
                <div class="group-title">Account</div>

                <button class="setting-item logout" onclick="lukasSettings.logout()">
                    🚪 Logout
                </button>
            </div>

        </div>
    </div>

    <!-- BACKDROP -->
    <div id="settings-backdrop"></div>

    <div id="lukas-toast" class="lukas-toast"></div>
    <!--Jquery  -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <!-- Particle js -->
    <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js'></script>
    <script src='https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.2/jquery-ui.min.js'></script>
    <script src="script.js"></script>

    <!-- Siri wave -->
    <!-- <script src="https://unpkg.com/siriwave/dist/siriwave.umd.min.js"></script> -->

    <!-- Texllate js -->
    <script src="assets/vendore/texllate/jquery.fittext.js"></script>
    <script src="assets/vendore/texllate/jquery.lettering.js"></script>
    <script src="http://jschr.github.io/textillate/jquery.textillate.js"></script>

    <!-- lottie files -->
    <!-- <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script> -->


    <script src="/eel.js"></script>
    <script src="main.js"></script>
    <script src="controller.js"></script>
    <script src="orb.js"></script>


</body>

</html>
